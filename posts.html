<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Архив сделок</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="navbar-brand">🌱 Scalper Blog</a>
            <div class="nav-links">
                <a href="index.html" class="nav-link">Главная</a>
                <a href="posts.html" class="nav-link active">Архив</a>
                <a href="stats.html" class="nav-link">Статистика</a>
                <a href="about.html" class="nav-link">О себе</a>
            </div>
        </div>
    </nav>

    <main class="container">
        <h1>Архив сделок</h1>

        <!-- Фильтры -->
        <div class="filters">
            <div class="filter-group">
                <label for="filter-pair" class="form-label">Пара</label>
                <select id="filter-pair" class="filter-select">
                    <option value="">Все</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="filter-direction" class="form-label">Направление</label>
                <select id="filter-direction" class="filter-select">
                    <option value="">Все</option>
                    <option value="long">Лонг</option>
                    <option value="short">Шорт</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="filter-search" class="form-label">Поиск</label>
                <input type="text" id="filter-search" class="filter-input" placeholder="Заголовок или описание">
            </div>
            <div class="filter-group filter-button">
                <button id="apply-filters" class="btn">Применить</button>
            </div>
        </div>

        <div id="posts-container" class="posts-grid"></div>
    </main>

    <footer class="footer">
        <div class="container">&copy; 2025 Scalper Blog</div>
    </footer>

    <script src="js/main.js"></script>
    <script src="js/posts.js"></script>
</body>
</html>
